version: 0.4.0
graph:
  id: nexus_dev_team
  description: Nexus Dev Cell workflow (Writer implementation + Controller quality gate)
  log_level: INFO
  is_majority_voting: false
  start:
    - WRITER
  nodes:
    - id: WRITER
      type: agent
      description: ""
      context_window: 0
      config:
        name: deepseek-r1:1.5b
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |
          You are @Writer (Dev Team).
          Input includes a markdown spec from @Drafter.
          Produce implementation output in this exact structure:
          1) IMPLEMENTATION_SUMMARY
          2) FILE_PLAN
          3) COMMANDS_TO_RUN
          4) RISKS
          Keep concise and executable.
        params:
          temperature: 0.1
          max_tokens: 900
        tooling: []
        thinking: null
        memories: []
        retry: null
    - id: CONTROLLER
      type: agent
      description: ""
      context_window: 0
      config:
        name: llama3.1:8b
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |
          You are @Controller.
          Validate Writer output against Drafter spec.
          Return exactly:
          [CONFIDENCE: X%]
          DECISION: ACCEPT or DECLINE
          REASONS: short bullet list
          NEXT_ACTION: one line
        params:
          temperature: 0.1
          max_tokens: 320
        tooling: []
        thinking: null
        memories: []
        retry: null
  edges:
    - from: WRITER
      to: CONTROLLER
  initial_instruction: ""
  end: []
