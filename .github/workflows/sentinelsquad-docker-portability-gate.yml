name: SentinelSquad Docker Portability Gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/sentinelsquad/**"
      - "docker-compose.yml"
      - "scripts/sentinelsquad-docker-*.sh"
      - "docs/SENTINELSQUAD_SETUP.md"
      - ".github/workflows/sentinelsquad-docker-portability-gate.yml"
  push:
    branches:
      - main
    paths:
      - "apps/sentinelsquad/**"
      - "docker-compose.yml"
      - "scripts/sentinelsquad-docker-*.sh"
      - "docs/SENTINELSQUAD_SETUP.md"
      - ".github/workflows/sentinelsquad-docker-portability-gate.yml"

jobs:
  portability-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure scripts executable
        run: |
          chmod +x scripts/sentinelsquad-docker-preflight.sh
          chmod +x scripts/sentinelsquad-docker-bootstrap.sh
          chmod +x scripts/sentinelsquad-docker-portability-gate.sh

      - name: Provision CI env file
        run: |
          cat > apps/sentinelsquad/.env <<'EOF'
          NEXTAUTH_URL=http://localhost:3577
          NEXTAUTH_SECRET=ci-nextauth-secret
          GITHUB_CLIENT_ID=ci-github-client-id
          GITHUB_CLIENT_SECRET=ci-github-client-secret
          DATABASE_URL=postgresql://sentinelsquad:sentinelsquad@localhost:34765/sentinelsquad?schema=public
          SENTINELSQUAD_GITHUB_TOKEN=ci-placeholder-token
          SENTINELSQUAD_GITHUB_PROJECT_OWNER=moldovancsaba
          SENTINELSQUAD_GITHUB_PROJECT_NUMBER=1
          SENTINELSQUAD_TASK_REPO_OWNER=moldovancsaba
          SENTINELSQUAD_TASK_REPO_NAME=sentinelsquad
          EOF

      - name: Run portability gate
        env:
          SENTINELSQUAD_DB_PORT: "55432"
          SENTINELSQUAD_APP_PORT: "3107"
          NEXTAUTH_URL: "http://localhost:3107"
          SENTINELSQUAD_DOCKER_HEALTH_TIMEOUT_SECONDS: "180"
        run: ./scripts/sentinelsquad-docker-portability-gate.sh
