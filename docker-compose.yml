services:
  sentinelsquad-db:
    image: postgres:16
    container_name: sentinelsquad-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinelsquad
      POSTGRES_PASSWORD: sentinelsquad
      POSTGRES_DB: sentinelsquad
    ports:
      - "${SENTINELSQUAD_DB_PORT:-34765}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelsquad -d sentinelsquad"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    volumes:
      - sentinelsquad_db_data:/var/lib/postgresql/data

  sentinelsquad-app:
    build:
      context: ./apps/sentinelsquad
      dockerfile: Dockerfile
    image: sentinelsquad-app:local
    container_name: sentinelsquad-app
    restart: unless-stopped
    depends_on:
      sentinelsquad-db:
        condition: service_healthy
    env_file:
      - ./apps/sentinelsquad/.env
    environment:
      DATABASE_URL: postgresql://sentinelsquad:sentinelsquad@sentinelsquad-db:5432/sentinelsquad?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3577}
    ports:
      - "${SENTINELSQUAD_APP_PORT:-3577}:3007"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/signin >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  sentinelsquad_db_data:
