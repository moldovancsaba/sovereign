services:
  sovereign-db:
    # pgvector required for ProjectMemory.embedding (LLD-006). Recreate volume if upgrading from plain postgres:16.
    image: pgvector/pgvector:pg16
    container_name: sovereign-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign
      POSTGRES_DB: sovereign
    ports:
      - "${SOVEREIGN_DB_PORT:-34765}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign -d sovereign"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    volumes:
      - sovereign_db_data:/var/lib/postgresql/data

  sovereign-app:
    build:
      context: ./apps/sovereign
      dockerfile: Dockerfile
    image: sovereign-app:local
    container_name: sovereign-app
    restart: unless-stopped
    depends_on:
      sovereign-db:
        condition: service_healthy
    env_file:
      - ./apps/sovereign/.env
    environment:
      DATABASE_URL: postgresql://sovereign:sovereign@sovereign-db:5432/sovereign?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3577}
    ports:
      - "${SOVEREIGN_APP_PORT:-3577}:3007"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/signin >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  sovereign_db_data:
